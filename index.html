se information rather than copy it. The important factor appears to be what learners do with their notes afterwards: reviewing, questioning and connecting ideas improve recall regardless of the tool used.`,de=[[`er1`,`A2`,D,`Who used the bicycles more than the organisers first expected?`,[`Only first-year students`,`Staff and senior students`,`Visitors from other universities`],`Staff and senior students`,`บทความใช้คำว่า Instead แล้วระบุ staff and senior students`,`detail`],[`er2`,`B1`,D,`Why were collection points moved?`,[`The bicycles needed repairs`,`Users wanted covered parking`,`Bicycles were hard to find at a busy time`],`Bicycles were hard to find at a busy time`,`unavailable around lunchtime คือหาจักรยานใช้ไม่ได้ในช่วงคนเยอะ`,`cause`],[`er3`,`B1`,D,`What will the organisers do before adding covered parking?`,[`Ask users for their views`,`Raise the rental price`,`Close the canteen collection points`],`Ask users for their views`,`survey users หมายถึงสอบถามความคิดเห็นผู้ใช้`,`sequence`],[`er4`,`B1`,ue,`Why might handwriting help some learners?`,[`It is always faster than typing`,`It can make them select the main ideas`,`It allows them to copy every word`],`It can make them select the main ideas`,`ผู้เขียนบอกว่าเขียนมือช้าจึงกระตุ้นให้สรุป ideas`,`inference`],[`er5`,`B1`,ue,`When can typing be just as useful?`,[`When students organise what they hear`,`When students type without stopping`,`When no review is required`],`When students organise what they hear`,`ข้อความระบุ typing can be equally effective when students organise information`,`detail`],[`er6`,`B2`,ue,`What is the writer’s main conclusion?`,[`The device matters more than study habits`,`Handwritten notes should replace digital notes`,`How notes are processed matters most`],`How notes are processed matters most`,`ย่อหน้าสุดท้ายชี้ว่าการทบทวน ตั้งคำถาม และเชื่อมโยงสำคัญกว่าเครื่องมือ`,`main-idea`]].map(([e,t,n,r,i,a,o,s])=>({id:e,type:`extended-reading`,level:t,passage:n,prompt:r,options:i,answer:a,explanation:o,tag:s})),fe=[[`ls1`,`A1`,`The photography class starts at a quarter to seven, not half past six as shown on the old poster.`,`What time does the class start?`,[`6:15`,`6:30`,`6:45`],`6:45`,`a quarter to seven คือ 6:45`,`time`],[`ls2`,`A1`,`Could I have the blue jacket in a medium? The small one fits, but I need more room for a sweater.`,`Which size does the speaker want?`,[`Small`,`Medium`,`Large`],`Medium`,`ผู้พูดขอ medium โดย small เป็น distractor`,`detail`],[`ls3`,`A2`,`The train to Bangkok will now leave from platform six instead of platform four.`,`Which platform should passengers use?`,[`4`,`6`,`10`],`6`,`คำว่า instead of เปลี่ยนจากข้อมูลเก่าไปข้อมูลใหม่`,`number`],[`ls4`,`A2`,`I thought the book would be too technical, but the examples made every idea easy to follow.`,`How does the speaker feel about the book?`,[`Pleasantly surprised`,`Still confused`,`Disappointed by the examples`],`Pleasantly surprised`,`ผู้พูดคาดว่าจะยาก แต่พบว่าเข้าใจง่าย`,`attitude`],[`ls5`,`A2`,`We can walk through the park, but the sky looks dark. Let’s take the bus so we don’t arrive wet.`,`How will they travel?`,[`On foot`,`By bus`,`By bicycle`],`By bus`,`ข้อสรุปท้ายสุดคือ Let’s take the bus`,`decision`],[`ls6`,`A2`,`I’m calling to ask whether there are still places on Saturday’s cooking course.`,`What is the purpose of the call?`,[`To complain about a meal`,`To check course availability`,`To change a recipe`],`To check course availability`,`ask whether there are still places = เช็กว่ามีที่ว่างหรือไม่`,`purpose`],[`ls7`,`B1`,`The hotel was farther from the beach than we expected, although the staff were extremely helpful.`,`What problem does the speaker mention?`,[`The location`,`The staff`,`The room size`],`The location`,`farther from the beach เป็นปัญหา ส่วนพนักงานเป็นข้อดี`,`contrast`],[`ls8`,`B1`,`Don’t print the report yet. Maria is checking the final figures and will send us the corrected version after lunch.`,`What should the listener do?`,[`Wait for a new version`,`Print before lunch`,`Check the figures for Maria`],`Wait for a new version`,`Don’t print yet และ corrected version ชี้ว่าต้องรอ`,`instruction`],[`ls9`,`B1`,`The exhibition opens on Monday, but volunteers are asked to arrive on Sunday afternoon for training.`,`When should volunteers arrive?`,[`Monday morning`,`Sunday afternoon`,`Saturday evening`],`Sunday afternoon`,`คำถามถาม volunteers ไม่ใช่วันเปิดนิทรรศการ`,`date`],[`ls10`,`B1`,`I used to study late at night, but I remember far more now that I review my notes before breakfast.`,`What change has the speaker made?`,[`Studies in the morning`,`Takes fewer notes`,`Skips breakfast`],`Studies in the morning`,`before breakfast แสดงว่าเปลี่ยนมาทบทวนตอนเช้า`,`detail`],[`ls11`,`B2`,`The proposal is imaginative, but unless the costs are revised, I doubt the committee will approve it.`,`What is the speaker’s opinion?`,[`The idea has potential but is too expensive`,`The committee has already approved it`,`The proposal lacks imagination`],`The idea has potential but is too expensive`,`imaginative เป็นข้อดี แต่ costs ต้องแก้ก่อน`,`opinion`],[`ls12`,`B2`,`We were going to hold the lecture in Room 204, but the science lab is quieter, so that’s where we’ll meet.`,`Where will the lecture take place?`,[`Room 204`,`The science lab`,`The main hall`],`The science lab`,`ข้อมูลสุดท้ายหลัง but คือสถานที่จริง`,`location`]].map(([e,t,n,r,i,a,o,s])=>({id:e,type:`listen-select`,level:t,audio:n,prompt:r,options:i,answer:a,explanation:o,tag:s})),pe=`Thanks for joining Saturday’s river clean-up. We’ll meet at the east gate at eight thirty, where team leaders will provide gloves and bags. Please bring drinking water, but leave heavy tools at home because the council is supplying them. The forecast says light rain in the morning, so wear a waterproof jacket. We expect to finish by noon, and lunch will be available at the community hall afterwards.`,O=`When Arun first began preparing for his English test, he tried to learn fifty new words every evening
