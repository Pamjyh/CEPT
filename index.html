<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อ่านภาษาไทย</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
  <style>
    /* ===== PlayStation Design System ===== */
    :root {
      --primary:          #0070d1;
      --primary-pressed:  #0064b7;
      --primary-active:   #004d8d;
      --commerce:         #d53b00;
      --on-primary:       #ffffff;
      --on-dark:          #ffffff;
      --body-dark:        rgba(255,255,255,0.7);
      --mute-dark:        rgba(229,229,229,0.55);
      --ash-dark:         rgba(229,229,229,0.2);
      --canvas-dark:      #000000;
      --elevated:         #121314;
      --card:             #181818;
      --hairline:         rgba(229,229,229,0.2);
      --warning:          #c81b3a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans Thai', 'Roboto', system-ui, sans-serif;
      background: var(--canvas-dark);
      color: var(--on-dark);
      min-height: 100vh;
    }

    /* ===== HEADER (hero-band-dark) ===== */
    .header {
      background: var(--canvas-dark);
      border-bottom: 1px solid var(--hairline);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.1px;
      color: var(--on-dark);
      line-height: 1.25;
    }
    .header-text p {
      font-size: 14px;
      font-weight: 400;
      color: var(--mute-dark);
      margin-top: 2px;
    }

    /* ===== TABS (filter-pill row) ===== */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: var(--elevated);
      border-bottom: 1px solid var(--hairline);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--hairline);
      border-radius: 9999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.324px;
      line-height: 1.25;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      background: transparent;
      color: var(--mute-dark);
    }
    .tab-icon { display: block; font-size: 1.25rem; line-height: 1.2; margin-bottom: 2px; }
    .tab-btn.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }
    .tab-btn:not(.active):hover {
      background: rgba(255,255,255,0.06);
      color: var(--on-dark);
    }

    /* ===== CONTENT ===== */
    .content { padding: 16px; max-width: 720px; margin: 0 auto; }
    .hint {
      text-align: center;
      color: var(--mute-dark);
      font-size: 14px;
      margin-bottom: 16px;
    }

    /* ===== CHARACTER GRID ===== */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }
    .char-card {
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 12px 4px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: 82px;
    }
    .char-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .char-card:active { opacity: 0.8; }
    .char-card .ch { font-size: 2.1rem; font-weight: 700; line-height: 1.2; }
    .char-card .em { font-size: 0.95rem; margin-top: 3px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--elevated);
      border: 1px solid var(--hairline);
      border-radius: 16px;
      max-width: 340px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: pop-in 0.18s ease;
    }
    @keyframes pop-in {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-top {
      background: var(--card);
      padding: 40px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--hairline);
    }
    .modal-top .big-char { font-size: 6.5rem; font-weight: 700; line-height: 1; }
    .modal-body { padding: 24px 24px 28px; text-align: center; }
    .modal-emoji   { font-size: 3rem; margin-bottom: 10px; }
    .modal-name    { font-size: 22px; font-weight: 300; color: var(--on-dark); letter-spacing: 0.1px; margin-bottom: 6px; }
    .modal-example { font-size: 14px; color: var(--mute-dark); margin-bottom: 24px; }
    .modal-example .ex-word { font-weight: 700; color: var(--on-dark); font-size: 15px; }
    .modal-btns { display: flex; gap: 10px; }

    /* ===== BUTTONS (pill — button-primary & button-secondary-dark) ===== */
    .btn {
      flex: 1;
      padding: 0 28px;
      height: 48px;
      border: none;
      border-radius: 9999px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.45px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { opacity: 0.85; }
    .btn-blue {
      background: var(--primary);
      color: var(--on-primary);
    }
    .btn-blue:hover { background: var(--primary-pressed); }
    .btn-green {
      background: #1a9e6e;
      color: #ffffff;
    }
    .btn-green:hover { background: #15835b; }
    .btn-gray {
      background: transparent;
      color: var(--on-dark);
      border: 1px solid var(--hairline);
    }
    .btn-gray:hover { background: rgba(255,255,255,0.06); }
    .btn-full  { width: 100%; flex: none; }
    .btn-lg    { height: 52px; font-size: 16px; }

    /* ===== PRACTICE MODE ===== */
    .practice-container { max-width: 400px; margin: 0 auto; }

    .set-selector { display: flex; gap: 8px; margin-bottom: 16px; }
    .set-btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--hairline);
      border-radius: 9999px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.324px;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--mute-dark);
    }
    .set-btn.s-cons, .set-btn.s-vow {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    /* Progress bar */
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 400;
      color: var(--mute-dark);
      margin-bottom: 6px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: var(--card);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 9999px;
      transition: width 0.45s ease;
    }

    /* Flashcard */
    .flashcard {
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 32px 24px 28px;
      text-align: center;
      margin-bottom: 16px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .flashcard.fade-out { opacity: 0; transform: translateY(8px); }
    .flashcard .big-char  { font-size: 7.5rem; font-weight: 700; line-height: 1; margin-bottom: 16px; }
    .flashcard .card-emoji{ font-size: 3rem; margin-bottom: 10px; }
    .flashcard .card-name { font-size: 22px; font-weight: 300; color: var(--on-dark); letter-spacing: 0.1px; margin-bottom: 4px; }
    .flashcard .card-ex   { font-size: 13px; color: var(--mute-dark); }
    .flashcard .card-ex .ex-word { font-weight: 700; color: var(--on-dark); font-size: 14px; }

    .practice-btns { display: flex; flex-direction: column; gap: 10px; }

    /* Completion */
    .completion-screen { text-align: center; padding: 48px 0; display: none; }
    .completion-screen .big-star { font-size: 5rem; margin-bottom: 8px; }
    .completion-screen .star-row { font-size: 2.5rem; margin-bottom: 16px; }
    .completion-screen h2 {
      font-size: 44px;
      font-weight: 300;
      color: var(--on-dark);
      letter-spacing: 0.1px;
      margin-bottom: 8px;
    }
    .completion-screen .sub  { font-size: 18px; color: var(--body-dark); margin-bottom: 4px; }
    .completion-screen .sub2 { font-size: 14px; color: var(--mute-dark); margin-bottom: 32px; }

    /* Voice bar */
    .voice-bar {
      background: var(--elevated);
      border-bottom: 1px solid var(--hairline);
      padding: 8px 16px;
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .voice-bar label { color: var(--mute-dark); font-weight: 400; white-space: nowrap; }
    .voice-bar select {
      flex: 1;
      font-size: 12px;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      padding: 4px 8px;
      background: var(--card);
      color: var(--on-dark);
      max-width: 260px;
      height: 28px;
    }
    .voice-badge {
      font-size: 12px;
      font-weight: 500;
      background: var(--primary);
      color: var(--on-primary);
      padding: 3px 10px;
      border-radius: 9999px;
      white-space: nowrap;
      letter-spacing: 0;
    }

    /* TTS warning */
    .tts-warn {
      background: var(--elevated);
      border: 1px solid rgba(200,27,58,0.4);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--body-dark);
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }

    @media (min-width: 500px) {
      .char-grid { grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 10px; }
      .char-card .ch { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

<!-- Header (hero-band-dark) -->
<div class="header">
  <div class="header-logo">📚</div>
  <div class="header-text">
    <h1>อ่านภาษาไทย</h1>
    <p>สำหรับนักเรียน ป.๑–๒</p>
  </div>
</div>

<!-- Tabs (filter-pill) -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('consonants')" id="tab-consonants">
    <span class="tab-icon">ก</span>พยัญชนะ
  </button>
  <button class="tab-btn" onclick="switchTab('vowels')" id="tab-vowels">
    <span class="tab-icon">า</span>สระ
  </button>
  <button class="tab-btn" onclick="switchTab('practice')" id="tab-practice">
    <span class="tab-icon">🎯</span>ฝึกอ่าน
  </button>
</div>

<!-- Voice bar -->
<div class="voice-bar" id="voice-bar">
  <label>🔊 เสียง:</label>
  <select id="voice-select" onchange="changeVoice(this.value)"></select>
  <span class="voice-badge" id="voice-badge"></span>
</div>

<!-- Content -->
<div class="content">

  <!-- GRID VIEW -->
  <div id="grid-view">
    <div class="tts-warn" id="tts-warn">
      ⚠️ ไม่พบเสียงภาษาไทย — ลองใช้ Chrome หรือเปิดผ่านเว็บ (GitHub Pages)
    </div>
    <p class="hint">แตะที่ตัวอักษรเพื่อฟังการออกเสียง</p>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <!-- PRACTICE VIEW -->
  <div id="practice-view" style="display:none">
    <div class="practice-container">

      <div class="set-selector">
        <button class="set-btn s-cons" id="set-btn-cons" onclick="setMode('consonants')">พยัญชนะ (44)</button>
        <button class="set-btn" id="set-btn-vow" onclick="setMode('vowels')">สระ (17)</button>
      </div>

      <div class="progress-info">
        <span id="progress-text">1 / 44</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="flashcard" id="flashcard">
        <div class="big-char" id="card-char">ก</div>
        <div class="card-emoji" id="card-emoji">🐔</div>
        <div class="card-name" id="card-name">กอ ไก่</div>
        <div class="card-ex">ตัวอย่าง: <span class="ex-word" id="card-example">ไก่</span></div>
      </div>

      <div class="practice-btns" id="practice-btns">
        <button class="btn btn-gray btn-full btn-lg" onclick="replayAudio()">🔊 ฟังอีกครั้ง</button>
        <button class="btn btn-blue btn-full btn-lg" id="next-btn" onclick="nextCard()">อ่านได้แล้ว ›</button>
      </div>

      <div class="completion-screen" id="completion-screen">
        <div class="big-star">🌟</div>
        <div class="star-row">⭐⭐⭐</div>
        <h2>เก่งมาก!</h2>
        <p class="sub" id="complete-msg">อ่านครบทั้ง 44 ตัวแล้ว!</p>
        <p class="sub2">หนูเก่งที่สุดเลย</p>
        <button class="btn btn-blue btn-full btn-lg" onclick="restart()">🔄 เริ่มใหม่อีกครั้ง</button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-top" id="modal-top">
      <div class="big-char" id="modal-char">ก</div>
    </div>
    <div class="modal-body">
      <div class="modal-emoji" id="modal-emoji">🐔</div>
      <div class="modal-name" id="modal-name">กอ ไก่</div>
      <div class="modal-example">ตัวอย่าง: <span class="ex-word" id="modal-example">ไก่</span></div>
      <div class="modal-btns">
        <button class="btn btn-blue" onclick="replayModal()">🔊 ฟังอีกครั้ง</button>
        <button class="btn btn-gray" onclick="closeModal()">✕ ปิด</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===========================
//         DATA
// ===========================
const CONSONANTS = [
  { char:"ก",  name:"กอ ไก่",       example:"ไก่",      emoji:"🐔"  },
  { char:"ข",  name:"ขอ ไข่",       example:"ไข่",      emoji:"🥚"  },
  { char:"ฃ",  name:"ขอ ขวด",       example:"ขวด",      emoji:"🍶"  },
  { char:"ค",  name:"คอ ควาย",      example:"ควาย",     emoji:"🐃"  },
  { char:"ฅ",  name:"คอ คน",        example:"คน",       emoji:"🧑"  },
  { char:"ฆ",  name:"คอ ระฆัง",     example:"ระฆัง",    emoji:"🔔"  },
  { char:"ง",  name:"งอ งู",        example:"งู",       emoji:"🐍"  },
  { char:"จ",  name:"จอ จาน",       example:"จาน",      emoji:"🍽️" },
  { char:"ฉ",  name:"ฉอ ฉิ่ง",      example:"ฉิ่ง",     emoji:"🎵"  },
  { char:"ช",  name:"ชอ ช้าง",      example:"ช้าง",     emoji:"🐘"  },
  { char:"ซ",  name:"ซอ โซ่",       example:"โซ่",      emoji:"⛓️" },
  { char:"ฌ",  name:"ชอ เฌอ",       example:"เฌอ",      emoji:"🌳"  },
  { char:"ญ",  name:"ยอ หญิง",      example:"หญิง",     emoji:"👧"  },
  { char:"ฎ",  name:"ดอ ชฎา",       example:"ชฎา",      emoji:"👑"  },
  { char:"ฏ",  name:"ตอ ปฏัก",      example:"ปฏัก",     emoji:"🏹"  },
  { char:"ฐ",  name:"ถอ ฐาน",       example:"ฐาน",      emoji:"🏛️" },
  { char:"ฑ",  name:"ทอ มณโฑ",      example:"มณโฑ",     emoji:"👸"  },
  { char:"ฒ",  name:"ทอ ผู้เฒ่า",   example:"ผู้เฒ่า",  emoji:"👴"  },
  { char:"ณ",  name:"นอ เณร",       example:"เณร",      emoji:"🧎"  },
  { char:"ด",  name:"ดอ เด็ก",      example:"เด็ก",     emoji:"👦"  },
  { char:"ต",  name:"ตอ เต่า",      example:"เต่า",     emoji:"🐢"  },
  { char:"ถ",  name:"ถอ ถุง",       example:"ถุง",      emoji:"👜"  },
  { char:"ท",  name:"ทอ ทหาร",      example:"ทหาร",     emoji:"💂"  },
  { char:"ธ",  name:"ทอ ธง",        example:"ธง",       emoji:"🚩"  },
  { char:"น",  name:"นอ หนู",       example:"หนู",      emoji:"🐭"  },
  { char:"บ",  name:"บอ ใบไม้",     example:"ใบไม้",    emoji:"🍃"  },
  { char:"ป",  name:"ปอ ปลา",       example:"ปลา",      emoji:"🐟"  },
  { char:"ผ",  name:"ผอ ผึ้ง",      example:"ผึ้ง",     emoji:"🐝"  },
  { char:"ฝ",  name:"ฝอ ฝา",        example:"ฝา",       emoji:"🪣"  },
  { char:"พ",  name:"พอ พาน",       example:"พาน",      emoji:"🏺"  },
  { char:"ฟ",  name:"ฟอ ฟัน",       example:"ฟัน",      emoji:"🦷"  },
  { char:"ภ",  name:"พอ สำเภา",     example:"สำเภา",    emoji:"⛵"  },
  { char:"ม",  name:"มอ ม้า",       example:"ม้า",      emoji:"🐴"  },
  { char:"ย",  name:"ยอ ยักษ์",     example:"ยักษ์",    emoji:"👹"  },
  { char:"ร",  name:"รอ เรือ",      example:"เรือ",     emoji:"⛵"  },
  { char:"ล",  name:"ลอ ลิง",       example:"ลิง",      emoji:"🐒"  },
  { char:"ว",  name:"วอ แหวน",      example:"แหวน",     emoji:"💍"  },
  { char:"ศ",  name:"สอ ศาลา",      example:"ศาลา",     emoji:"🏛️" },
  { char:"ษ",  name:"สอ ฤๅษี",      example:"ฤๅษี",     emoji:"🧙"  },
  { char:"ส",  name:"สอ เสือ",      example:"เสือ",     emoji:"🐯"  },
  { char:"ห",  name:"หอ หีบ",       example:"หีบ",      emoji:"📦"  },
  { char:"ฬ",  name:"ลอ จุฬา",      example:"จุฬา",     emoji:"✈️" },
  { char:"อ",  name:"ออ อ่าง",      example:"อ่าง",     emoji:"🪣"  },
  { char:"ฮ",  name:"ฮอ นกฮูก",    example:"นกฮูก",    emoji:"🦉"  },
];

const VOWELS = [
  { char:"อา",   name:"สระ อา",              example:"กา",    emoji:"🐦", speakText:"สระ อา ตัวอย่าง กา"    },
  { char:"อิ",   name:"สระ อิ",              example:"กิ่ง",  emoji:"🌿", speakText:"สระ อิ ตัวอย่าง กิ่ง"  },
  { char:"อี",   name:"สระ อี",              example:"มีด",   emoji:"🗡️",speakText:"สระ อี ตัวอย่าง มีด"   },
  { char:"อึ",   name:"สระ อึ",              example:"นึก",   emoji:"🤔", speakText:"สระ อึ ตัวอย่าง นึก"   },
  { char:"อื",   name:"สระ อื",              example:"ลืม",   emoji:"💭", speakText:"สระ อื ตัวอย่าง ลืม"   },
  { char:"อุ",   name:"สระ อุ",              example:"กุ้ง",  emoji:"🦐", speakText:"สระ อุ ตัวอย่าง กุ้ง"  },
  { char:"อู",   name:"สระ อู",              example:"หมู",   emoji:"🐷", speakText:"สระ อู ตัวอย่าง หมู"   },
  { char:"เอ",   name:"สระ เอ",              example:"เสือ",  emoji:"🐯", speakText:"สระ เอ ตัวอย่าง เสือ"  },
  { char:"แอ",   name:"สระ แอ",              example:"แมว",   emoji:"🐱", speakText:"สระ แอ ตัวอย่าง แมว"   },
  { char:"โอ",   name:"สระ โอ",              example:"โต",    emoji:"💪", speakText:"สระ โอ ตัวอย่าง โต"    },
  { char:"เอา",  name:"สระ เอา",             example:"เกา",   emoji:"✋", speakText:"สระ เอา ตัวอย่าง เกา"  },
  { char:"อำ",   name:"สระ อำ",              example:"ดำ",    emoji:"🖤", speakText:"สระ อำ ตัวอย่าง ดำ"    },
  { char:"ไอ",   name:"สระ ไอ (ไม้มลาย)",   example:"ไก่",   emoji:"🐔", speakText:"สระ ไอ ไม้มลาย ตัวอย่าง ไก่"  },
  { char:"ใอ",   name:"สระ ใอ (ไม้ม้วน)",   example:"ใจ",    emoji:"❤️", speakText:"สระ ใอ ไม้ม้วน ตัวอย่าง ใจ"   },
  { char:"เอีย", name:"สระ เอีย",            example:"เรียน", emoji:"📚", speakText:"สระ เอีย ตัวอย่าง เรียน" },
  { char:"เอือ", name:"สระ เอือ",            example:"เรือ",  emoji:"⛵", speakText:"สระ เอือ ตัวอย่าง เรือ" },
  { char:"อัว",  name:"สระ อัว",             example:"ตัว",   emoji:"🐛", speakText:"สระ อัว ตัวอย่าง ตัว"   },
];

// Vibrant accent colors — bright on dark backgrounds (PS game tile style)
const CHAR_COLORS = [
  '#FF6B6B','#FF9F43','#FECA57','#48DBFB','#1DD1A1',
  '#54A0FF','#A29BFE','#FD79A8','#00D2D3','#6C5CE7',
  '#FDCB6E','#E17055','#74B9FF','#00CEC9','#E84393',
  '#B2BEC3',
];

// ===========================
//         STATE
// ===========================
let currentTab     = 'consonants';
let practiceMode   = 'consonants';
let practiceIndex  = 0;
let isCompleted    = false;
let modalSpeakText = '';
let cardTimer      = null;
let selectedVoiceId = null;
let currentCharColor = CHAR_COLORS[0];

// ===========================
//         SPEECH
// ===========================
function getSpeakText(item) {
  if (item.speakText) return item.speakText;
  const sound = item.name.split(' ')[0];
  return item.name + ' อ่านว่า ' + sound;
}

function speak(text) {
  if (selectedVoiceId === 'rv') {
    if (window.responsiveVoice) {
      try {
        window.responsiveVoice.cancel();
        window.responsiveVoice.speak(text, 'Thai Female', { rate: 0.8, pitch: 1 });
        return;
      } catch(e) {
        selectedVoiceId = null; // fall through
      }
    }
  }
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = 'th-TH';
  u.rate  = 0.75;
  u.pitch = 1.05;
  if (selectedVoiceId) {
    const v = window.speechSynthesis.getVoices().find(x => x.name === selectedVoiceId);
    if (v) u.voice = v;
  }
  window.speechSynthesis.speak(u);
}

const NEURAL_KW = ['neural','premium','enhanced','siri','niwat','premwadee','wavenet'];

function voiceBadge(id) {
  if (id === 'rv') return '🌐 ออนไลน์';
  if (!id) return '';
  return NEURAL_KW.some(k => id.toLowerCase().includes(k)) ? '✨ Neural' : '';
}

function updateBadge(id) {
  const b = document.getElementById('voice-badge');
  const lbl = voiceBadge(id);
  b.textContent = lbl;
  b.style.display = lbl ? 'inline' : 'none';
}

function loadVoices() {
  const options = [];

  // ResponsiveVoice — show if script loaded (skip voiceSupport check)
  if (window.responsiveVoice) {
    options.push({ id: 'rv', label: '🌐 Thai Female — ออนไลน์' });
  }

  // System voices — deduplicate by name
  if (window.speechSynthesis) {
    const seen = new Set();
    window.speechSynthesis.getVoices()
      .filter(v => v.lang.startsWith('th'))
      .forEach(v => {
        if (seen.has(v.name)) return;
        seen.add(v.name);
        const star = NEURAL_KW.some(k => v.name.toLowerCase().includes(k)) ? ' ✨' : '';
        options.push({ id: v.name, label: v.name + star });
      });
  }

  if (options.length === 0) {
    document.getElementById('tts-warn').style.display = 'block';
    return;
  }

  if (!selectedVoiceId) {
    const best = options.find(o =>
      o.id === 'rv' || NEURAL_KW.some(k => o.id.toLowerCase().includes(k))
    );
    selectedVoiceId = (best || options[0]).id;
  }

  const sel = document.getElementById('voice-select');
  const keep = sel.value || selectedVoiceId;
  sel.innerHTML = options
    .map(o => `<option value="${o.id}"${o.id === keep ? ' selected' : ''}>${o.label}</option>`)
    .join('');

  updateBadge(selectedVoiceId);
  document.getElementById('voice-bar').style.display = 'flex';
}

function changeVoice(id) {
  selectedVoiceId = id;
  updateBadge(id);
}

// ===========================
//         TABS
// ===========================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'practice') {
    document.getElementById('grid-view').style.display     = 'none';
    document.getElementById('practice-view').style.display = 'block';
    updateCard();
  } else {
    document.getElementById('grid-view').style.display     = 'block';
    document.getElementById('practice-view').style.display = 'none';
    renderGrid(tab === 'vowels' ? VOWELS : CONSONANTS);
  }
}

// ===========================
//         GRID
// ===========================
function renderGrid(items) {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  items.forEach((item, i) => {
    const color = CHAR_COLORS[i % CHAR_COLORS.length];
    const btn = document.createElement('button');
    btn.className = 'char-card';
    btn.innerHTML = `
      <span class="ch" style="color:${color}">${item.char}</span>
      <span class="em">${item.emoji}</span>
    `;
    btn.onclick = () => openModal(item, i);
    grid.appendChild(btn);
  });
}

// ===========================
//         MODAL
// ===========================
function openModal(item, colorIdx) {
  const color = CHAR_COLORS[colorIdx % CHAR_COLORS.length];
  modalSpeakText = getSpeakText(item);

  document.getElementById('modal-char').textContent    = item.char;
  document.getElementById('modal-char').style.color    = color;
  document.getElementById('modal-emoji').textContent   = item.emoji;
  document.getElementById('modal-name').textContent    = item.name;
  document.getElementById('modal-example').textContent = item.example;

  document.getElementById('modal-overlay').classList.remove('hidden');
  speak(modalSpeakText);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  window.speechSynthesis && window.speechSynthesis.cancel();
}

function replayModal() { speak(modalSpeakText); }

// ===========================
//         PRACTICE
// ===========================
function getPracticeItems() {
  return practiceMode === 'vowels' ? VOWELS : CONSONANTS;
}

function setMode(mode) {
  practiceMode  = mode;
  practiceIndex = 0;
  isCompleted   = false;
  const cBtn = document.getElementById('set-btn-cons');
  const vBtn = document.getElementById('set-btn-vow');
  cBtn.className = 'set-btn' + (mode === 'consonants' ? ' s-cons' : '');
  vBtn.className = 'set-btn' + (mode === 'vowels'     ? ' s-vow'  : '');
  showPracticeMain();
  updateCard();
}

function updateCard() {
  const items = getPracticeItems();
  const item  = items[practiceIndex];
  if (!item) return;

  const color = CHAR_COLORS[practiceIndex % CHAR_COLORS.length];
  const total = items.length;
  const pct   = Math.round((practiceIndex / total) * 100);

  document.getElementById('progress-text').textContent = `${practiceIndex + 1} / ${total}`;
  document.getElementById('progress-pct').textContent  = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const cardChar = document.getElementById('card-char');
  cardChar.textContent = item.char;
  cardChar.style.color = color;

  document.getElementById('card-emoji').textContent   = item.emoji;
  document.getElementById('card-name').textContent    = item.name;
  document.getElementById('card-example').textContent = item.example;

  const isLast = practiceIndex + 1 >= total;
  document.getElementById('next-btn').textContent =
    isLast ? '🏆 เสร็จแล้ว!' : 'อ่านได้แล้ว ›';

  clearTimeout(cardTimer);
  cardTimer = setTimeout(() => speak(getSpeakText(item)), 400);
}

function replayAudio() {
  const item = getPracticeItems()[practiceIndex];
  if (item) speak(getSpeakText(item));
}

function nextCard() {
  const items = getPracticeItems();
  clearTimeout(cardTimer);

  if (practiceIndex + 1 >= items.length) {
    isCompleted = true;
    window.speechSynthesis && window.speechSynthesis.cancel();

    document.getElementById('progress-text').textContent = `${items.length} / ${items.length}`;
    document.getElementById('progress-pct').textContent  = '100%';
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('complete-msg').textContent  = `อ่านครบทั้ง ${items.length} ตัวแล้ว!`;

    document.getElementById('flashcard').style.display       = 'none';
    document.getElementById('practice-btns').style.display   = 'none';
    document.getElementById('completion-screen').style.display = 'block';

    setTimeout(() => speak('เก่งมาก! หนูอ่านครบทุกตัวแล้ว'), 400);
    return;
  }

  const fc = document.getElementById('flashcard');
  fc.classList.add('fade-out');
  setTimeout(() => {
    practiceIndex++;
    updateCard();
    fc.classList.remove('fade-out');
  }, 150);
}

function showPracticeMain() {
  document.getElementById('flashcard').style.display          = 'block';
  document.getElementById('practice-btns').style.display     = 'flex';
  document.getElementById('completion-screen').style.display  = 'none';
}

function restart() {
  practiceIndex = 0;
  isCompleted   = false;
  showPracticeMain();
  updateCard();
}

// ===========================
//         INIT
// ===========================
renderGrid(CONSONANTS);

// System voices
if (window.speechSynthesis) {
  if (window.speechSynthesis.getVoices().length > 0) loadVoices();
  window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
}

// ResponsiveVoice — retry หลายรอบ (RV โหลดช้า)
(function initRV() {
  if (window.responsiveVoice) {
    window.responsiveVoice.OnReady = loadVoices;
    loadVoices();
  } else {
    // ลองใหม่หลังหน้าโหลดเสร็จ: 300ms, 800ms, 2000ms
    const delays = [300, 800, 2000];
    delays.forEach(ms => {
      window.addEventListener('load', () => setTimeout(() => {
        if (window.responsiveVoice) loadVoices();
      }, ms));
    });
  }
})();
</script>
</body>
